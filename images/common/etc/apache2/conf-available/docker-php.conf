<FilesMatch \.php$>
    # 2.4.10+ can proxy to unix socket
    # ProxyFCGIBackendType GENERIC
    SetHandler proxy:fcgi://localhost:9000
</FilesMatch>
DirectoryIndex disabled
DirectoryIndex index.php index.html
<Directory /var/www/>
    Options -Indexes
    AllowOverride All
</Directory>

# Healthchecks: Set /healthcheck to be the healthcheck URL
ProxyPass "/healthcheck" "fcgi://localhost:9000"
ProxyPassReverse "/healthcheck" "fcgi://localhost:9000"

# Set the Proxy Timeout to be 30 minutes
ProxyTimeout 1800

# Set environment variable for healthcheck requests
SetEnvIf Request_URI "^/healthcheck$" dontlog

# CustomLog directive to conditionally log requests (combined log, sent to stdout for Docker)
LogFormat "%l %u %t %v %a \"%r\" %>s %b" commonvhost
CustomLog "|/usr/bin/tee ${APACHE_LOG_DIR}/access.log" commonvhost env=!dontlog
ErrorLog "|/usr/bin/tee ${APACHE_LOG_DIR}/error.log"

# Configure Log Level
LogLevel ${LOG_OUTPUT_LEVEL}

# Disable Server Signature for increased security
ServerSignature Off